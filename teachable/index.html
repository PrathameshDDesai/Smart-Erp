<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edu Plus Pose Recognition</title>
    <!-- Import Google Fonts for a modern UI -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --surface-color: rgba(255, 255, 255, 0.05);
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --text-color: #ffffff;
            --text-muted: #a0aec0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #1a233a 0%, #0b0f19 70%);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .app-container {
            background: var(--surface-color);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            width: 100%;
            max-width: 600px;
        }

        .action-button {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(58, 123, 213, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .action-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(58, 123, 213, 0.5);
        }

        .action-button:active {
            transform: translateY(1px);
        }

        #canvas-container {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #000;
            display: none; /* hidden until started */
            border: 2px solid rgba(255,255,255,0.05);
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            max-width: 400px;
            max-height: 400px;
        }

        #label-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
        }

        .label-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 1rem;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .label-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .label-value {
            color: var(--primary);
            font-variant-numeric: tabular-nums;
        }

        .progress-bar-bg {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            width: 100%;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            width: 0%;
            transition: width 0.1s linear;
            border-radius: 4px;
        }

        #status {
            color: var(--text-muted);
            font-style: italic;
            margin-top: 1rem;
            text-align: center;
        }
        
        .train-link {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            margin-top: -10px;
            transition: color 0.3s;
        }

        .train-link:hover {
            color: var(--secondary);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Edu Plus Pose</h1>
        <p class="subtitle">AI-Powered Pose Recognition System</p>
    </div>

    <div class="app-container">
        <button id="start-btn" class="action-button" onclick="init()">Initialize Camera</button>
        <p id="status">Waiting to start...</p>
        
        <a href="https://teachablemachine.withgoogle.com/train/pose" target="_blank" class="train-link">Train a new model here</a>
        
        <div id="canvas-container">
            <canvas id="canvas"></canvas>
        </div>
        
        <div id="label-container"></div>
    </div>

    <!-- Load TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <!-- Load Teachable Machine Pose Library -->
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8.3/dist/teachablemachine-pose.min.js"></script>
    
    <script type="text/javascript">
        // Replace this with the URL provided by the Teachable Machine export panel
        // For example: 'https://teachablemachine.withgoogle.com/models/xyz123/'
        const URL = 'YOUR_TEACHABLE_MACHINE_MODEL_URL_HERE/';
        
        let model, webcam, ctx, labelContainer, maxPredictions;
        let isStarted = false;

        async function init() {
            if (isStarted) return;
            
            const statusEl = document.getElementById('status');
            
            if (URL.includes("YOUR_TEACHABLE_MACHINE_MODEL_URL_HERE")) {
                statusEl.innerHTML = "⚠️ Please add your Teachable Machine Model URL in the code (line 144) first.";
                statusEl.style.color = "#ff4757";
                return;
            }

            statusEl.innerText = "Loading model... Please wait.";
            document.getElementById('start-btn').disabled = true;
            document.getElementById('start-btn').innerText = "Loading...";

            const modelURL = URL + 'model.json';
            const metadataURL = URL + 'metadata.json';

            try {
                // load the model and metadata
                model = await tmPose.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                // Convenience function to setup a webcam
                const flip = true; // whether to flip the webcam
                // using 400x400 for better view
                webcam = new tmPose.Webcam(400, 400, flip); 
                await webcam.setup(); // request access to the webcam
                webcam.play();
                
                isStarted = true;
                statusEl.style.display = 'none';
                document.getElementById('start-btn').style.display = 'none';
                
                // Show canvas
                const canvasContainer = document.getElementById('canvas-container');
                canvasContainer.style.display = 'block';

                window.requestAnimationFrame(loop);

                // append/get elements to the DOM
                const canvas = document.getElementById('canvas');
                canvas.width = 400; 
                canvas.height = 400;
                ctx = canvas.getContext('2d');
                
                labelContainer = document.getElementById('label-container');
                labelContainer.innerHTML = '';
                
                for (let i = 0; i < maxPredictions; i++) {
                    const div = document.createElement('div');
                    div.className = 'label-item';
                    
                    const header = document.createElement('div');
                    header.className = 'label-header';
                    
                    const name = document.createElement('span');
                    name.className = 'label-name';
                    
                    const value = document.createElement('span');
                    value.className = 'label-value';
                    value.innerText = '0.00';
                    
                    header.appendChild(name);
                    header.appendChild(value);
                    
                    const barBg = document.createElement('div');
                    barBg.className = 'progress-bar-bg';
                    
                    const barFill = document.createElement('div');
                    barFill.className = 'progress-bar-fill';
                    
                    barBg.appendChild(barFill);
                    
                    div.appendChild(header);
                    div.appendChild(barBg);
                    
                    labelContainer.appendChild(div);
                }
            } catch (err) {
                console.error("Initialization error:", err);
                statusEl.innerText = "Error: Could not access camera or load model.";
                statusEl.style.color = "#ff4757";
                document.getElementById('start-btn').disabled = false;
                document.getElementById('start-btn').innerText = "Try Again";
            }
        }

        async function loop(timestamp) {
            webcam.update(); // update the webcam frame
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            // run input through posenet
            const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
            // run input through teachable machine classification model
            const prediction = await model.predict(posenetOutput);

            for (let i = 0; i < maxPredictions; i++) {
                const probability = prediction[i].probability;
                const item = labelContainer.childNodes[i];
                
                const nameEl = item.querySelector('.label-name');
                const valueEl = item.querySelector('.label-value');
                const fillEl = item.querySelector('.progress-bar-fill');
                
                nameEl.innerText = prediction[i].className;
                valueEl.innerText = probability.toFixed(2);
                fillEl.style.width = Math.round(probability * 100) + '%';
                
                // Change bar color based on confidence
                if (probability > 0.8) {
                    fillEl.style.background = 'linear-gradient(90deg, #00b09b, #96c93d)'; // Greenish for high confidence
                } else if (probability > 0.4) {
                    fillEl.style.background = 'linear-gradient(90deg, var(--secondary), var(--primary))'; // Default blue
                } else {
                    fillEl.style.background = 'linear-gradient(90deg, #ff416c, #ff4b2b)'; // Reddish for low confidence
                }
            }

            drawPose(pose);
        }

        function drawPose(pose) {
            ctx.drawImage(webcam.canvas, 0, 0);
            if (pose) {
                const minPartConfidence = 0.5;
                // Draw skeleton with neon blue/pink colors to match the theme
                tmPose.drawKeypoints(pose.keypoints, minPartConfidence, ctx, 5, '#00d2ff', '#00d2ff');
                tmPose.drawSkeleton(pose.keypoints, minPartConfidence, ctx, 3, '#ff00aa');
            }
        }
    </script>
</body>
</html>
